<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Document</title>
  </head>

  <body>
    <div class="main">
      <div class="right-container">
        <div class="logo-container">
          <img class="logo-image" src="./assets/logo.png" />
          <p class="odin-text">ODIN</p>
        </div>
      </div>
      <div class="form-container">
        <div class="s1">
          <p>
            This is not a real online service! You know you need something like
            this in your life to help you realise your deepest dreams.
            <br />
            <br />
            Sign up now and start your journey to the stars!
          </p>
        </div>
        <div class="s2">
          <h2>Let's do this</h2>
          <form
            class="signupform"
            action="/submit"
            method="POST"
            id="signupform"
          >
            <div><label>First Name</label> <input type="text" /></div>
            <div><label>Last Name</label> <input type="text" /></div>
            <div><label>Email</label> <input type="email" /></div>
            <div><label>Phone Number</label> <input type="number" /></div>
            <div><label>Password</label> <input type="password" /></div>
            <div><label>Confirm Password</label> <input type="password" /></div>
          </form>
        </div>
        <div class="s3">
          <button type="submit" form="signupForm" class="create-account-btn">
            Create Account
          </button>
          <p class="login">Already have an account? <a href="#">Log in</a></p>
        </div>
      </div>
    </div>
  </body>
</html>
